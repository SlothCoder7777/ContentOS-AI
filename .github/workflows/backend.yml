name: ContentOS AI Backend CI

on:
    push:
        branches:
            - main
            - master

    pull_request:
        branches:
            - main
            - master

    workflow_dispatch:

permissions:
    contents: read

jobs:
    backend-ci:
        name: FastAPI Backend Checks
        runs-on: windows-latest
        timeout-minutes: 15

        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}
            JWT_SECRET_KEY: ${{ secrets.SECRET_KEY }}
            ALGORITHM: HS256
            JWT_ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRE_MINUTES: 30
            ENVIRONMENT: ci
            PYTHONPATH: ${{ github.workspace }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python 3.13
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Show Python version
              run: |
                  python --version
                  pip --version

            - name: Upgrade pip
              run: |
                  python -m pip install --upgrade pip

            - name: Install backend dependencies
              run: |
                  pip install -r requirements.txt

            - name: Validate required GitHub Secrets
              run: |
                  if ("${{ secrets.DATABASE_URL }}" -eq "") {
                    Write-Error "DATABASE_URL secret is missing. Add it in GitHub repository secrets."
                  }

                  if ("${{ secrets.SECRET_KEY }}" -eq "") {
                    Write-Error "SECRET_KEY secret is missing. Add it in GitHub repository secrets."
                  }

            - name: Check Python imports
              run: |
                  python -c "from app.main import app; print('FastAPI app imported successfully')"

            - name: Check Alembic migration state
              run: |
                  alembic current

            - name: Apply Alembic migrations
              run: |
                  alembic upgrade head

            - name: Compile backend source
              run: |
                  python -m compileall app

            - name: Run backend tests
              run: |
                  if (Test-Path "tests") {
                    python -m pytest tests -q
                  } else {
                    Write-Host "No tests folder found. Skipping pytest."
                  }
